<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CL1 Neural Trading Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/boot.css">
</head>
<body>
  <!-- BIOS Boot Sequence Overlay -->
  <div class="boot-overlay" id="boot-overlay"></div>

  <!-- Main Dashboard (hidden until boot completes) -->
  <div class="dashboard hidden" id="dashboard">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="stat" title="MEA electrode array channel count">
        <span class="stat-label">Neurons:</span>
        <span class="stat-value" id="stat-neurons">64</span>
      </span>
      <span class="stat" title="Neural synchronization index - derived from win rate EMA">
        <span class="stat-label">Coherence:</span>
        <span class="stat-value" id="stat-coherence">0.00</span>
      </span>
      <span class="stat" title="Signal entropy measure - derived from price volatility">
        <span class="stat-label">Entropy:</span>
        <span class="stat-value" id="stat-entropy">0.00</span>
      </span>
      <span class="stat" title="Neural firing frequency - events per minute">
        <span class="stat-label">Firing Rate:</span>
        <span class="stat-value" id="stat-firing-rate">0 Hz</span>
      </span>
      <span class="stat" title="Realized trade win percentage">
        <span class="stat-label">Win Rate:</span>
        <span class="stat-value" id="stat-win-rate">0%</span>
      </span>
      <span class="stat ws-status" title="WebSocket connection status">
        <span class="ws-dot" id="ws-dot"></span>
      </span>
    </div>

    <!-- Three-Column Layout -->
    <div class="panel neuron-panel">
      <div class="panel-header">MEA Visualizer</div>
      <div class="panel-content">
        <canvas id="neuron-canvas"></canvas>
      </div>
    </div>

    <div class="panel positions-panel">
      <div class="panel-header">Active Positions</div>
      <div class="panel-content" id="positions-list"></div>
    </div>

    <div class="panel terminal-panel">
      <div class="panel-header">
        Neural Decision Log
        <button class="toggle-btn" id="terminal-toggle" title="Toggle raw/structured view">RAW</button>
      </div>
      <div class="panel-content" id="terminal"></div>
    </div>
  </div>

  <script src="js/boot.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
